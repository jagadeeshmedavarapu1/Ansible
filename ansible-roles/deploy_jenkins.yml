---
# The playbook.yml file should be located in the root directory alongside the tomcat10 role definition.
- name: Deploy Jenkins using Apache Tomcat Server on Linux (Redhat/Ubuntu) Nodes
  hosts: redhat_nodes
  gather_facts: true
  become: yes
  vars_files:
    - tomcat10/vars/tomcat_manager.yml  

  roles:
    - role: jenkins