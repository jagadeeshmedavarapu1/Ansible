---
# tasks file for springPetClinic
- name: Install required packages on Ubuntu
  apt:
    name:
      - git
      - maven
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Install required packages on RedHat
  dnf:
    name:
      - git
      - maven
    state: present
  when: ansible_os_family == "RedHat"

- name: Remove old source directory
  file:
    path: "{{ build_dir }}"
    state: absent

- name: Clone Spring PetClinic repository
  git:
    repo: "{{ spring_pet_clinic_repo }}"
    dest: "{{ build_dir }}"
    version: main
    force: yes

- name: Build Spring PetClinic
  shell: mvn clean package -DskipTests
  args:
    chdir: "{{ build_dir }}"

- name: Create application directory
  file:
    path: "{{ app_home }}"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ group_name }}"
    mode: '0755'

- name: Copy generated JAR
  shell: |
    cp {{ build_dir }}/target/*.jar \
       {{ app_home }}/spring-petclinic.jar
  args:
    executable: /bin/bash

- name: Set ownership on application directory
  file:
    path: "{{ app_home }}"
    owner: "{{ user_name }}"
    group: "{{ group_name }}"
    recurse: yes

- name: Create application.properties
  copy:
    dest: "{{ app_home }}/application.properties"
    owner: "{{ user_name }}"
    group: "{{ group_name }}"
    mode: '0644'
    content: |
      server.port={{ app_port }}

- name: Create Spring PetClinic systemd service
  template:
    src: spring-petclinic.service.j2
    dest: /etc/systemd/system/spring-petclinic.service
    mode: '0644'
  notify:
    - Reload systemd
    - Restart Spring PetClinic

- name: Flush handlers
  meta: flush_handlers

- name: Wait for application to start
  wait_for:
    port: "{{ app_port }}"
    delay: 10
    timeout: 120